<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order History — Wisco</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f2f5;--sur:#fff;--sur2:#f6f8fa;--bd:#d0d7de;--bd2:#e8ebee;--tx:#1f2328;--mu:#636c76;--ac:#d42030;--done:#1a7f37;--late:#cf222e;--prog:#0550ae;--spec:#7c3aed;--done-bg:#dafbe1;--late-bg:#ffebe9;--prog-bg:#ddf4ff;--spec-bg:#f5f3ff;--done-bd:#82cfad;--late-bd:#f5a1a0;--prog-bd:#79c0ff;--spec-bd:#c4b5fd;--r:6px;--rl:12px}
html,body{background:var(--bg);color:var(--tx);font-family:'Sarabun','Inter',sans-serif;min-height:100vh}
header{background:linear-gradient(90deg,#08090e,#0e1018);border-bottom:1px solid #1e2438;padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.logo{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px}
.btn{font-size:13px;padding:6px 14px;border-radius:var(--r);font-family:'Sarabun',sans-serif;cursor:pointer;font-weight:500;border:1px solid var(--bd);background:var(--sur);color:var(--tx);transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--sur2)}
.btn-primary{background:var(--ac);color:#fff;border-color:var(--ac)}.btn-primary:hover{opacity:.9}

/* SEARCH SECTION */
.search-section{background:var(--sur);border-bottom:1px solid var(--bd);padding:16px 24px}
.search-title{font-size:18px;font-weight:700;margin-bottom:14px;color:var(--tx)}
.search-bar{display:flex;gap:10px;margin-bottom:12px}
.search-input{flex:1;font-size:14px;padding:10px 14px;border:1px solid var(--bd);border-radius:var(--r);font-family:'Sarabun',sans-serif;background:var(--sur)}
.search-input:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 3px rgba(212,32,48,.1)}
.search-btn{padding:10px 20px;background:var(--ac);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif;white-space:nowrap}
.search-btn:hover{opacity:.9}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:140px}
.filter-label{font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.5px}
.filter-select{font-size:13px;padding:6px 10px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sur);font-family:'Sarabun',sans-serif;cursor:pointer}
.filter-select:focus{outline:none;border-color:var(--ac)}
.date-range{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--mu)}
.date-input{font-size:13px;padding:6px 8px;border:1px solid var(--bd);border-radius:var(--r);background:var(--sur);font-family:'Sarabun',sans-serif}
.clear-btn{font-size:12px;padding:6px 12px;border:1px solid var(--bd);border-radius:var(--r);background:transparent;color:var(--mu);cursor:pointer;font-family:'Sarabun',sans-serif}
.clear-btn:hover{background:var(--sur2);color:var(--tx)}

/* RESULTS */
.results-section{padding:20px 24px}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.results-count{font-size:13px;color:var(--mu)}
.results-count strong{color:var(--tx)}
.sort-wrap{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--mu)}

/* TABLE */
.table-wrap{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--sur2);border-bottom:1px solid var(--bd)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:var(--tx)}
th.sort-asc::after{content:' ↑'}th.sort-desc::after{content:' ↓'}
tbody tr{border-bottom:1px solid var(--bd2);cursor:pointer;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--sur2)}
td{padding:10px 14px;font-size:13px;vertical-align:middle}
.poi-id{font-weight:700;font-family:'Inter',sans-serif;color:var(--tx)}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap;display:inline-block}
.p-done{background:var(--done-bg);color:var(--done);border:1px solid var(--done-bd)}
.p-late{background:var(--late-bg);color:var(--late);border:1px solid var(--late-bd)}
.p-prog{background:var(--prog-bg);color:var(--prog);border:1px solid var(--prog-bd)}
.p-pend{background:#fff8c5;color:#9a6700;border:1px solid #e3b341}
.p-spec{background:var(--spec-bg);color:var(--spec);border:1px solid var(--spec-bd)}
.prog-mini{display:flex;align-items:center;gap:6px}
.prog-bar-sm{width:60px;height:5px;background:var(--bd2);border-radius:99px;overflow:hidden}
.prog-fill-sm{height:100%;border-radius:99px}
.customers-cell{font-size:12px;color:var(--mu);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.highlight{background:#fff3b0;border-radius:2px;padding:0 2px}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.ov.open{display:flex}
.modal{background:var(--sur);border:1px solid var(--bd);border-radius:var(--rl);width:680px;max-width:97vw;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd2);background:var(--sur2)}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;padding:0}.modal-close:hover{color:var(--tx)}
.modal-body{overflow-y:auto;padding:20px}
.modal-section{margin-bottom:18px}
.modal-section-title{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bd2)}
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.info-item .ik{font-size:11px;color:var(--mu)}
.info-item .iv{font-size:13px;font-weight:600;color:var(--tx);margin-top:1px}
.tl-row{display:grid;grid-template-columns:26px 1fr auto;gap:8px;padding:7px 0;border-bottom:1px solid var(--bd2);align-items:start;font-size:12px}
.tl-row:last-child{border-bottom:none}
.tl-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.tn-done{background:var(--done-bg);color:var(--done);border:1px solid var(--done-bd)}
.tn-skip{background:var(--sur2);color:var(--mu);border:1px solid var(--bd)}
.tn-wait{background:var(--sur2);color:var(--mu);border:1px solid var(--bd)}
.tl-name{font-size:13px;font-weight:500;padding-top:4px}
.tl-sub{font-size:11px;color:var(--mu);margin-top:1px}
.tl-date{font-size:11px;color:var(--done);padding-top:5px;white-space:nowrap}

/* ITEMS TABLE IN MODAL */
.items-tbl{width:100%;border-collapse:collapse;font-size:12px}
.items-tbl th{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;padding:5px 8px;text-align:left;border-bottom:1px solid var(--bd2);background:var(--sur2)}
.items-tbl td{padding:6px 8px;border-bottom:1px solid var(--bd2)}
.items-tbl tr:last-child td{border-bottom:none}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-icon{font-size:48px;opacity:.3;margin-bottom:12px}
.empty-text{font-size:14px;color:var(--mu)}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px}
</style>
</head>
<body>
<header>
  <div class="logo">
    <img src="logo.png" style="height:30px;width:auto;object-fit:contain" alt="Wisco">
    <span style="color:#e84050;font-weight:600">Order History</span>
  </div>
  <div style="display:flex;gap:8px">
    <a href="dashboard.html" class="btn">📊 Dashboard</a>
    <a href="edit.html" class="btn btn-primary">✏️ จัดการ Order</a>
  </div>
</header>

<div class="search-section">
  <div class="search-title">🔍 ค้นหา Order</div>
  <div class="search-bar">
    <input class="search-input" id="q" placeholder="ค้นหาด้วย POI number, ลูกค้า, Supplier, สินค้า, PR Number..." onkeydown="if(event.key==='Enter')doSearch()">
    <button class="search-btn" onclick="doSearch()">ค้นหา</button>
  </div>
  <div class="filter-row">
    <div class="filter-group">
      <span class="filter-label">สถานะ</span>
      <select class="filter-select" id="f-status" onchange="doSearch()">
        <option value="">ทั้งหมด</option>
        <option value="done">✅ เสร็จแล้ว</option>
        <option value="progress">🔵 กำลังดำเนินการ</option>
        <option value="late">🔴 เลยกำหนด</option>
        <option value="spec">⚡ Special Case</option>
        <option value="pending">⚪ ยังไม่เริ่ม</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Supplier</span>
      <select class="filter-select" id="f-supplier" onchange="doSearch()">
        <option value="">ทั้งหมด</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">วันที่เปิด PO (ตั้งแต่)</span>
      <input class="date-input" type="date" id="f-date-from" onchange="doSearch()">
    </div>
    <div class="filter-group">
      <span class="filter-label">ถึง</span>
      <input class="date-input" type="date" id="f-date-to" onchange="doSearch()">
    </div>
    <div style="align-self:flex-end">
      <button class="clear-btn" onclick="clearFilters()">✕ ล้างตัวกรอง</button>
    </div>
  </div>
</div>

<div class="results-section">
  <div class="results-header">
    <div class="results-count" id="results-count">กำลังโหลด...</div>
    <div class="sort-wrap">
      เรียงโดย:
      <select class="filter-select" id="sort-by" onchange="doSearch()" style="min-width:130px">
        <option value="id-desc">POI ล่าสุดก่อน</option>
        <option value="id-asc">POI เก่าสุดก่อน</option>
        <option value="date-desc">วันที่ส่งมอบ (ใหม่)</option>
        <option value="date-asc">วันที่ส่งมอบ (เก่า)</option>
        <option value="pct-desc">ความคืบหน้า (มากสุด)</option>
        <option value="pct-asc">ความคืบหน้า (น้อยสุด)</option>
      </select>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="setSort('id')">POI Number</th>
          <th>Supplier</th>
          <th>ลูกค้า / สินค้า</th>
          <th onclick="setSort('date')">วันที่ส่งมอบ</th>
          <th>ความคืบหน้า</th>
          <th>สถานะ</th>
          <th>วันที่เปิด PO</th>
        </tr>
      </thead>
      <tbody id="results-body"></tbody>
    </table>
    <div id="empty-state" class="empty" style="display:none">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">ไม่พบ Order ที่ตรงกับการค้นหา</div>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="ov" id="modal" onclick="if(event.target===this)closeM()">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="m-title">รายละเอียด</span>
      <button class="modal-close" onclick="closeM()">×</button>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

<script>
const API='';
const DEFAULT_STEPS=["รับ PR","หา SUP","เทียบ SUP","รับ Drawing","ลูกค้า Approve Drawing","ขอ Approve Nameplate","เปิด POI","Approve POI","ส่ง POI / Drawing / Nameplate ให้ SUP","รับ PI","เริ่มผลิต","ตรวจสอบก่อนแพ็คสินค้า","จ่ายเงิน SUP","เทียบราคาค่าขนส่ง (AIR/SEA/TRUCK)","รีเช็คระหว่างขนส่ง","ตรวจสอบสินค้า","รับสินค้า"];
let _all=[], _steps=[], _filtered=[], _sortBy='id', _sortDir='desc';

async function init(){
  const [orders,cfg]=await Promise.all([
    fetch(API+'/api/orders').then(r=>r.json()),
    fetch(API+'/api/config').then(r=>r.json())
  ]);
  _steps=cfg.steps||DEFAULT_STEPS.map(n=>({name:n,defaultDays:1}));
  _all=orders.map(o=>({
    ...o,
    items:Array.isArray(o.items)&&o.items.length?o.items.map(it=>({...it,subItems:(it.subItems&&it.subItems.length)?it.subItems:[{product:it.product||'',quantity:it.quantity||''}]})):[{customer:o.customer||'',prNumber:'',subItems:[{product:o.product||'',quantity:o.quantity||''}]}],
    skippedSteps:Array.isArray(o.skippedSteps)?o.skippedSteps:Array(o.totalSteps||17).fill(false)
  }));
  // populate supplier filter
  const sups=[...new Set(_all.map(o=>o.factory).filter(Boolean))].sort();
  document.getElementById('f-supplier').innerHTML='<option value="">ทั้งหมด</option>'+sups.map(s=>`<option>${s}</option>`).join('');
  doSearch();
}

function getStepName(o,i){
  if(!o.prepayment)return _steps[i]?.name||'Step '+(i+1);
  if(i<10)return _steps[i]?.name||'Step '+(i+1);
  if(i===10)return '💳 จ่ายเงินล่วงหน้า';
  return _steps[i-1]?.name||'Step '+i;
}
function calcStatus(o){
  if(o.completedSteps>=o.totalSteps)return'done';
  const due=o.dueDate?new Date(o.dueDate):null;
  if(due&&due<new Date())return'late';
  for(let i=0;i<o.totalSteps;i++){if(o.isSpecial&&o.isSpecial[i])return'spec';}
  if(o.completedSteps===0)return'pending';
  return'progress';
}
function pillCls(s){return{done:'p-done',late:'p-late',progress:'p-prog',pending:'p-pend',spec:'p-spec'}[s]||'p-pend'}
function pillLbl(s){return{done:'✅ เสร็จ',late:'🔴 เลยกำหนด',progress:'🔵 กำลังดำเนินการ',pending:'⚪ ยังไม่เริ่ม',spec:'⚡ Special'}[s]||s}
function fColor(s){return{done:'#1a7f37',late:'#cf222e',progress:'#0550ae',pending:'#9a6700',spec:'#7c3aed'}[s]||'#9ca3af'}
function parseId(id){const m=(id||'').match(/POI(\d{4})-(\d+)/i);return m?parseInt(m[1])*10000+parseInt(m[2]):0;}

function highlight(text, q){
  if(!q||!text)return text||'';
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return String(text).replace(re,'<span class="highlight">$1</span>');
}

function doSearch(){
  const q=(document.getElementById('q').value||'').trim().toLowerCase();
  const fStatus=document.getElementById('f-status').value;
  const fSup=document.getElementById('f-supplier').value;
  const fFrom=document.getElementById('f-date-from').value;
  const fTo=document.getElementById('f-date-to').value;
  const sortBy=document.getElementById('sort-by').value;

  _filtered=_all.filter(o=>{
    const s=calcStatus(o);
    if(fStatus&&s!==fStatus)return false;
    if(fSup&&o.factory!==fSup)return false;
    if(fFrom&&o.startDate&&o.startDate<fFrom)return false;
    if(fTo&&o.startDate&&o.startDate>fTo)return false;
    if(!q)return true;
    // search across all fields
    const searchIn=[
      o.id, o.factory, o.customerPO, o.startDate, o.dueDate, o.product,
      ...(o.items||[]).flatMap(it=>[it.customer,it.prNumber,...(it.subItems||[]).map(s=>s.product)])
    ].join(' ').toLowerCase();
    return searchIn.includes(q);
  });

  // Sort
  _filtered.sort((a,b)=>{
    if(sortBy==='id-desc')return parseId(b.id)-parseId(a.id);
    if(sortBy==='id-asc')return parseId(a.id)-parseId(b.id);
    if(sortBy==='date-desc')return(b.dueDate||'').localeCompare(a.dueDate||'');
    if(sortBy==='date-asc')return(a.dueDate||'').localeCompare(b.dueDate||'');
    const pa=Math.round((a.completedSteps/a.totalSteps)*100);
    const pb=Math.round((b.completedSteps/b.totalSteps)*100);
    if(sortBy==='pct-desc')return pb-pa;
    if(sortBy==='pct-asc')return pa-pb;
    return 0;
  });

  document.getElementById('results-count').innerHTML=`พบ <strong>${_filtered.length}</strong> Order จากทั้งหมด <strong>${_all.length}</strong> Order`;
  document.getElementById('empty-state').style.display=_filtered.length?'none':'flex';

  const tbody=document.getElementById('results-body');
  tbody.innerHTML=_filtered.map(o=>{
    const s=calcStatus(o);
    const pct=Math.round((o.completedSteps/o.totalSteps)*100);
    const customers=(o.items||[]).map(it=>it.customer).filter(Boolean).join(', ')||o.customer||'—';
    const products=(o.items||[]).flatMap(it=>(it.subItems||[]).map(s=>s.product)).filter(Boolean).slice(0,2).join(', ')||(o.product||'—');
    const fcol=fColor(s);
    return`<tr onclick="openDetail('${o.id}')">
      <td><div class="poi-id">${highlight(o.id,q)}</div>${o.customerPO?`<div style="font-size:11px;color:var(--mu)">PO: ${highlight(o.customerPO,q)}</div>`:''}</td>
      <td style="font-size:13px">${highlight(o.factory||'—',q)}</td>
      <td><div class="customers-cell" title="${customers}">${highlight(customers,q)}</div><div style="font-size:11px;color:var(--mu);margin-top:2px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${highlight(products,q)}</div></td>
      <td style="font-size:12px;color:${s==='late'?'var(--late)':'var(--mu)'};font-weight:${s==='late'?'600':'400'}">${o.dueDate||'—'}</td>
      <td><div class="prog-mini"><div class="prog-bar-sm"><div class="prog-fill-sm" style="width:${pct}%;background:${fcol}"></div></div><span style="font-size:11px;color:var(--mu)">${pct}%</span></div></td>
      <td><span class="pill ${pillCls(s)}">${pillLbl(s)}</span></td>
      <td style="font-size:12px;color:var(--mu)">${o.startDate||o.poOpenDate||'—'}</td>
    </tr>`;
  }).join('');
}

function clearFilters(){
  document.getElementById('q').value='';
  document.getElementById('f-status').value='';
  document.getElementById('f-supplier').value='';
  document.getElementById('f-date-from').value='';
  document.getElementById('f-date-to').value='';
  doSearch();
}

function setSort(field){
  const sel=document.getElementById('sort-by');
  if(field==='id') sel.value=sel.value==='id-desc'?'id-asc':'id-desc';
  if(field==='date') sel.value=sel.value==='date-desc'?'date-asc':'date-desc';
  doSearch();
}

function openDetail(id){
  const o=_all.find(x=>x.id===id);if(!o)return;
  const s=calcStatus(o);
  const pct=Math.round((o.completedSteps/o.totalSteps)*100);
  const items=o.items||[{customer:o.customer||'',prNumber:'',subItems:[{product:o.product||'',quantity:o.quantity||''}]}];

  const itemRows=items.map(it=>{
    const subs=it.subItems&&it.subItems.length?it.subItems:[{product:it.product||'',quantity:it.quantity||''}];
    return subs.map((s2,si)=>`<tr>
      ${si===0?`<td rowspan="${subs.length}" style="font-weight:600;vertical-align:top">${it.customer||'—'}</td>
       <td rowspan="${subs.length}" style="color:var(--spec);vertical-align:top">${it.prNumber||'—'}</td>`:''}
      <td>${s2.product||'—'}</td><td style="color:var(--mu)">${s2.quantity||'—'}</td>
    </tr>`).join('');
  }).join('');

  const tl=Array.from({length:o.totalSteps},(_,i)=>{
    const done=i<o.completedSteps;
    const skipped=o.skippedSteps&&o.skippedSteps[i];
    const nc=done?'tn-done':skipped?'tn-skip':'tn-wait';
    const lbl=done?'✓':skipped?'⏭':i+1;
    const name=getStepName(o,i);
    const resp=(o.responsible||[])[i]||'—';
    const dd=(o.doneDates||[])[i]||'';
    if(!done&&!skipped&&i>o.completedSteps) return ''; // hide future steps for cleaner view
    return`<div class="tl-row">
      <div class="tl-num ${nc}">${lbl}</div>
      <div><div class="tl-name" style="${skipped?'opacity:.5;text-decoration:line-through':''}${done?'':';color:var(--mu)'}">${name}</div>
      <div class="tl-sub">👤 ${resp}</div></div>
      <div class="tl-date">${dd||''}</div>
    </div>`;
  }).join('');

  document.getElementById('m-title').innerHTML=`${o.id} <span class="pill ${pillCls(s)}">${pillLbl(s)}</span>`;
  document.getElementById('m-body').innerHTML=`
    <div class="modal-section">
      <div class="modal-section-title">ข้อมูลทั่วไป</div>
      <div class="info-grid">
        <div class="info-item"><div class="ik">Supplier</div><div class="iv">${o.factory||'—'}</div></div>
        <div class="info-item"><div class="ik">วันที่เปิด PO</div><div class="iv">${o.startDate||o.poOpenDate||'—'}</div></div>
        <div class="info-item"><div class="ik">วันที่ส่งมอบ</div><div class="iv" style="color:${s==='late'?'var(--late)':'var(--tx)'}">${o.dueDate||'—'}</div></div>
        <div class="info-item"><div class="ik">วันที่ผลิตเสร็จ</div><div class="iv">${o.productionFinishDate||'—'}</div></div>
        <div class="info-item"><div class="ik">ความคืบหน้า</div><div class="iv">${pct}% (${o.completedSteps}/${o.totalSteps})</div></div>
        <div class="info-item"><div class="ik">Customer PO</div><div class="iv">${o.customerPO||'—'}</div></div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">📦 รายการสินค้า (${items.length} ลูกค้า)</div>
      <table class="items-tbl"><thead><tr><th>ลูกค้า</th><th>PR Number</th><th>สินค้า</th><th>จำนวน</th></tr></thead><tbody>${itemRows}</tbody></table>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">ขั้นตอนที่ดำเนินการแล้ว</div>
      ${tl||'<div style="font-size:13px;color:var(--mu)">ยังไม่มีขั้นตอนที่เสร็จ</div>'}
    </div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <a href="edit.html" class="btn btn-primary" style="flex:1;justify-content:center">✏️ เปิดแก้ไข Order นี้</a>
    </div>`;
  document.getElementById('modal').classList.add('open');
}
function closeM(){document.getElementById('modal').classList.remove('open')}

init();
</script>
