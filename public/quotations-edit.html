<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotation Manager — Wisco</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080d;--s1:#0c0e17;--s2:#111422;--s3:#171b2d;--s4:#1c2136;
  --bd:#222944;--bd2:#161a2e;
  --tx:#f1f3f9;--mu:#7888a7;
  --spec:#bb86fc;--blue:#3a7bd5;
  --done:#22c55e;--late:#ef4444;--pend:#eab308;--hold:#64748b;
  --done-dim:rgba(34,197,94,.1);--late-dim:rgba(239,68,68,.1);--pend-dim:rgba(234,179,8,.1);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Sarabun','Inter',sans-serif;overflow:hidden}
#app{display:grid;grid-template-rows:60px 1fr;height:100vh}

header{background:linear-gradient(90deg,#07080d 0%,#0c0e17 50%,#07080d 100%);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:relative}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#bb86fc,#3a7bd5,#7888a7,#ef4444,transparent)}
.logo{display:flex;align-items:center;gap:12px}
.logo-name{font-size:18px;font-weight:800;font-family:'Inter',sans-serif;color:#fff}
.logo-name span{color:var(--spec)}

.btn{font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,var(--spec),var(--blue));color:#fff;box-shadow:0 4px 12px rgba(187,134,252,.3)}
.btn-primary:hover{opacity:.95;transform:translateY(-1px)}
.btn-secondary{background:var(--s3);color:var(--tx);border:1px solid var(--bd)}
.btn-secondary:hover{background:var(--s4)}
.btn-danger{background:var(--late);color:#fff}
.btn-danger:hover{opacity:.9}

main{display:grid;grid-template-columns:380px 1fr;overflow:hidden;height:calc(100vh - 60px)}

/* LEFT PANEL (LIST) */
.list-panel{background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.search-box{padding:16px;border-bottom:1px solid var(--bd);background:var(--s2);display:flex;flex-direction:column;gap:12px}
.search-inp{background:var(--s1);border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:10px 14px;font-size:13px;font-family:'Sarabun',sans-serif;width:100%}
.search-inp:focus{outline:none;border-color:var(--spec)}

.filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.fchip{font-size:11px;padding:6px 12px;border-radius:99px;border:1px solid var(--bd);background:transparent;color:var(--mu);cursor:pointer;white-space:nowrap;transition:all .15s}
.fchip.active{background:var(--s3);border-color:var(--spec);color:#fff}

.qlist{flex:1;overflow-y:auto;padding:12px}
.qcard{background:var(--s2);border:1px solid var(--bd2);border-radius:10px;padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:all .15s;position:relative}
.qcard:hover{border-color:var(--spec);transform:translateX(2px)}
.qcard.active{background:var(--s3);border-color:var(--spec);box-shadow:0 0 10px rgba(187,134,252,.1)}
.qcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.qcard.st-WIN::before{background:var(--done)}
.qcard.st-PENDING::before{background:var(--pend)}
.qcard.st-LOST::before{background:var(--late)}
.qcard.st-HOLD::before{background:var(--hold)}

.qc-hdr{display:flex;justify-content:space-between;align-items:center}
.qc-no{font-size:14px;font-weight:800;font-family:'Inter',sans-serif}
.badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.b-win{background:var(--done-dim);color:var(--done)}
.b-pending{background:var(--pend-dim);color:var(--pend)}
.b-lost{background:var(--late-dim);color:var(--late)}
.b-hold{background:rgba(100,116,139,.15);color:var(--hold)}

.qc-cust{font-size:12px;color:var(--mu);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qc-info{display:flex;justify-content:space-between;font-size:11px;color:var(--mu);margin-top:8px}

/* RIGHT PANEL (WORK AREA) */
.work-panel{background:var(--bg);overflow-y:auto;padding:24px;display:flex;flex-direction:column}
.empty-view{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--mu)}
.empty-icon{font-size:48px;margin-bottom:16px}

.section-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.section-title{font-size:14px;font-weight:700;color:var(--spec);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;border-bottom:1px solid var(--bd);padding-bottom:8px}

.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.detail-item{background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:12px 14px}
.detail-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;margin-bottom:4px}
.detail-val{font-size:14px;font-weight:600}

/* PROGRESS BAR */
.timeline{display:flex;justify-content:space-between;margin:24px 0;position:relative;padding:0 24px}
.timeline::before{content:'';position:absolute;top:15px;left:24px;right:24px;height:2px;background:var(--s3);z-index:1}
.timeline-fill{position:absolute;top:15px;left:24px;height:2px;background:var(--done);z-index:2;transition:width .3s}
.t-node{width:32px;height:32px;border-radius:50%;background:var(--s3);border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;z-index:3;cursor:pointer;position:relative;transition:all .2s}
.t-node.done{background:var(--done);border-color:var(--done);color:#fff}
.t-node.active{background:var(--s2);border-color:var(--spec);color:var(--spec);box-shadow:0 0 10px var(--spec)}
.t-lbl{position:absolute;top:38px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;white-space:nowrap;color:var(--mu);text-align:center}
.t-node.active .t-lbl{color:var(--spec)}
.t-node.done .t-lbl{color:var(--tx)}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.ov.open{display:flex}
.modal{background:var(--s2);border:1px solid var(--bd);border-radius:14px;width:640px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.7)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd);background:var(--s1);border-radius:14px 14px 0 0}
.modal-title{font-size:16px;font-weight:700;color:#fff}
.modal-close{background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;line-height:1}
.modal-body{overflow-y:auto;padding:20px}
.modal-ftr{padding:14px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:10px;background:var(--s1);border-radius:0 0 14px 14px}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.fg-span{grid-column:span 2}
.fg label{font-size:12px;font-weight:600;color:var(--mu)}
input,select,textarea{background:var(--s1);border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:8px 12px;font-size:13px;font-family:'Sarabun',sans-serif}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--spec)}
.req{color:var(--late);margin-left:2px}

/* AUTOCOMPLETE WRAP */
.autocomplete-wrap{position:relative}
.autocomplete-drop{position:absolute;top:100%;left:0;right:0;background:var(--s3);border:1px solid var(--bd);border-radius:8px;max-height:160px;overflow-y:auto;z-index:999;display:none}
.autocomplete-drop.show{display:block}
.ac-option{padding:8px 12px;font-size:12px;cursor:pointer}
.ac-option:hover{background:var(--s4);color:#fff}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="logo">
    <img src="logo.png" style="height:36px;width:auto;object-fit:contain" alt="Wisco">
    <div class="logo-name">Quotation <span style="color:var(--spec)">Manager</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <a href="quotations.html" style="font-size:12px;color:var(--tx);text-decoration:none;padding:5px 12px;border:1px solid var(--bd);border-radius:99px;background:var(--s1)" target="_blank">📊 Corporate Dashboard</a>
    <a href="edit.html" style="font-size:12px;color:var(--tx);text-decoration:none;padding:5px 12px;border:1px solid var(--bd);border-radius:99px;background:var(--s1)" target="_blank">✏️ PO Tracker Edit</a>
    <button class="btn btn-primary" onclick="openCreateModal()">+ Open Quotation</button>
  </div>
</header>
<main>
  <!-- LEFT SIDE: QUOTATIONS LIST -->
  <div class="list-panel">
    <div class="search-box">
      <input type="text" id="q-search" class="search-inp" placeholder="ค้นหาใบเสนอราคา..." oninput="rList()">
      <div class="filter-bar">
        <button class="fchip active" id="f-all" onclick="setFilter('all')">ทั้งหมด</button>
        <button class="fchip" id="f-pending" onclick="setFilter('PENDING')">🟡 รอราคา</button>
        <button class="fchip" id="f-win" onclick="setFilter('WIN')">🟢 ชนะ (WIN)</button>
        <button class="fchip" id="f-lost" onclick="setFilter('LOST')">🔴 LOST</button>
        <button class="fchip" id="f-hold" onclick="setFilter('HOLD')">⚪ HOLD</button>
      </div>
    </div>
    <div class="qlist" id="q-list"></div>
  </div>

  <!-- RIGHT SIDE: WORKSPACE -->
  <div class="work-panel" id="work-pane">
    <div class="empty-view">
      <div class="empty-icon">📂</div>
      <h3>กรุณาเลือกใบเสนอราคาเพื่อเปิดบอร์ดบริหาร</h3>
      <p style="margin-top:6px;font-size:13px">หรือกดปุ่ม "+ Open Quotation" เพื่อเริ่มงานใหม่</p>
    </div>
  </div>
</main>
</div>

<!-- CREATE/EDIT MODAL -->
<div class="ov" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="m-title">Open New Quotation</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="q-form" onsubmit="event.preventDefault(); saveQuotation();">
        <div class="form-grid">
          <div class="fg">
            <label>Quotation No. <span class="req">*</span></label>
            <input id="f-qno" required placeholder="เช่น Q6905-001">
          </div>
          <div class="fg">
            <label>ประเภทงานใบเสนอราคา <span class="req">*</span></label>
            <select id="f-type" required onchange="onTypeOrDateChange()">
              <!-- Options loaded from config -->
            </select>
          </div>
          <div class="fg">
            <label>วันที่เปิดบอร์ด <span class="req">*</span></label>
            <input id="f-start" type="date" required onchange="onTypeOrDateChange()">
          </div>
          <div class="fg">
            <label>กำหนดส่งลูกค้า (Auto-Calculated) <span class="req">*</span></label>
            <input id="f-due" type="date" required>
          </div>
          <div class="fg">
            <label>LD No.</label>
            <input id="f-ld" placeholder="เช่น LD69001">
          </div>
          <div class="fg">
            <label>ลูกค้า <span class="req">*</span></label>
            <div class="autocomplete-wrap">
              <input id="f-cust" required placeholder="พิมพ์เพื่อค้นหาลูกค้า..." autocomplete="off" oninput="showCustDrop(this.value)" onfocus="showCustDrop(this.value)" onblur="setTimeout(hideCustDrop,200)">
              <div class="autocomplete-drop" id="cust-drop"></div>
            </div>
          </div>
          <div class="fg">
            <label>ประเภทลูกค้า (Auto)</label>
            <input id="f-cust-type" readonly placeholder="คำนวณจากกฎแมป" style="background:var(--s3);color:var(--mu)">
          </div>
          <div class="fg">
            <label>Sale Team <span class="req">*</span></label>
            <select id="f-saleteam" required>
              <!-- Options loaded from config -->
            </select>
          </div>
          <div class="fg">
            <label>ผู้เสนอขาย (Sale) <span class="req">*</span></label>
            <select id="f-sale" required>
              <!-- Options loaded from config -->
            </select>
          </div>
          <div class="fg">
            <label>มูลค่าเสนอราคา (บาท)</label>
            <input id="f-offer" type="number" step="0.01" min="0" placeholder="0.00">
          </div>
          <div class="fg">
            <label>วันที่เสนอราคา (Offer Date)</label>
            <input id="f-offer-date" type="date">
          </div>
          <div class="fg">
            <label>วันที่จัดทำเสร็จ (Completed Date)</label>
            <input id="f-completed-date" type="date">
          </div>
          <div class="fg fg-span">
            <label>รายละเอียดสินค้า / Product</label>
            <textarea id="f-product" rows="3" placeholder="ระบุแบรนด์ รุ่น ข้อมูลทางเทคนิค..."></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-ftr">
      <button class="btn btn-secondary" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" type="submit" form="q-form">บันทึกข้อมูล</button>
    </div>
  </div>
</div>

<script>
const PROGRESS_STEPS = ["ตรวจสอบข้อมูล", "รอราคาเมืองนอก / เคลียเสปค", "ตรวจสอบเสปค ดำเนินการภายใน", "Quotation Submitted"];
let _quotations = [], _config = {}, _selected = null, _filter = 'all', _editId = null;

// Date helpers
function addBusinessDays(startDateStr, days) {
  if (!startDateStr || isNaN(days)) return '';
  let date = new Date(startDateStr);
  let count = 0;
  while (count < days) {
    date.setDate(date.getDate() + 1);
    const day = date.getDay(); // 0: Sunday, 6: Saturday
    if (day !== 0 && day !== 6) {
      count++;
    }
  }
  return date.toISOString().split('T')[0];
}

function matchCustomerType(name) {
  if (!name) return 'End-user';
  const val = name.toLowerCase();
  for (const [key, type] of Object.entries(_config.customerMap || {})) {
    if (val.includes(key.toLowerCase())) return type;
  }
  return 'End-user';
}

async function loadData() {
  const [quotes, cfg] = await Promise.all([
    fetch('/api/quotations').then(r => r.json()),
    fetch('/api/config').then(r => r.json())
  ]);
  _quotations = quotes;
  _config = cfg;
}

function onTypeOrDateChange() {
  const start = document.getElementById('f-start').value;
  const typeName = document.getElementById('f-type').value;
  const match = (_config.quotationTypes || []).find(t => t.name === typeName);
  if (start && match) {
    document.getElementById('f-due').value = addBusinessDays(start, match.days);
  }
}

// Autocomplete customers
function showCustDrop(q) {
  const drop = document.getElementById('cust-drop');
  const filtered = (_config.customers || []).filter(c => c.toLowerCase().includes(q.toLowerCase()));
  drop.innerHTML = filtered.map(c => `<div class="ac-option" onmousedown="selectCust('${c.replace(/'/g, "\\'")}')">${c}</div>`).join('');
  
  // Custom option to add as new
  if (q.trim() && !filtered.includes(q.trim())) {
    drop.innerHTML += `<div class="ac-option" style="color:var(--spec)" onmousedown="selectCust('${q.trim().replace(/'/g, "\\'")}')">+ เพิ่มลูกค้าใหม่: "${q.trim()}"</div>`;
  }
  drop.classList.add('show');
}
function hideCustDrop() {
  document.getElementById('cust-drop').classList.remove('show');
}
function selectCust(name) {
  document.getElementById('f-cust').value = name;
  document.getElementById('f-cust-type').value = matchCustomerType(name);
  hideCustDrop();
}

function initFormDropdowns() {
  // Quotation Types
  const fType = document.getElementById('f-type');
  fType.innerHTML = (_config.quotationTypes || []).map(t => `<option value="${t.name}">${t.name} (${t.days} วัน)</option>`).join('');
  
  // Sale Teams
  document.getElementById('f-saleteam').innerHTML = (_config.saleTeams || []).map(t => `<option value="${t}">${t}</option>`).join('');
  
  // Sales
  document.getElementById('f-sale').innerHTML = (_config.sales || []).map(s => `<option value="${s}">${s}</option>`).join('');
}

function openCreateModal() {
  _editId = null;
  document.getElementById('m-title').textContent = 'เปิดบอร์ดใบเสนอราคาใหม่ (Open Quotation)';
  document.getElementById('q-form').reset();
  
  // Default values
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('f-start').value = today;
  document.getElementById('f-cust-type').value = 'End-user';
  document.getElementById('f-offer-date').value = '';
  document.getElementById('f-completed-date').value = '';
  
  initFormDropdowns();
  onTypeOrDateChange();
  
  document.getElementById('modal').classList.add('open');
}

function openEditModal(q) {
  _editId = q.id;
  document.getElementById('m-title').textContent = 'แก้ไขรายละเอียดใบเสนอราคา (' + q.quotation_no + ')';
  
  initFormDropdowns();
  
  document.getElementById('f-qno').value = q.quotation_no;
  document.getElementById('f-type').value = q.quotation_type;
  document.getElementById('f-start').value = q.start_date;
  document.getElementById('f-due').value = q.due_date;
  document.getElementById('f-ld').value = q.ld_no;
  document.getElementById('f-cust').value = q.customer;
  document.getElementById('f-cust-type').value = q.customer_type;
  document.getElementById('f-saleteam').value = q.sale_team;
  document.getElementById('f-sale').value = q.sale;
  document.getElementById('f-offer').value = q.total_offer;
  document.getElementById('f-offer-date').value = q.offer_date || '';
  document.getElementById('f-completed-date').value = q.completed_date || '';
  document.getElementById('f-product').value = q.product;
  
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

async function saveQuotation() {
  const custName = document.getElementById('f-cust').value.trim();
  
  // If customer name is not in the system customer config list, auto-add it to database config
  if (!(_config.customers || []).includes(custName)) {
    _config.customers.push(custName);
    await fetch('/api/config/customers', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ customers: _config.customers })
    });
  }

  const payload = {
    quotationNo: document.getElementById('f-qno').value.trim(),
    quotationType: document.getElementById('f-type').value,
    startDate: document.getElementById('f-start').value,
    dueDate: document.getElementById('f-due').value,
    ldNo: document.getElementById('f-ld').value.trim(),
    customer: custName,
    customerType: document.getElementById('f-cust-type').value,
    saleTeam: document.getElementById('f-saleteam').value,
    sale: document.getElementById('f-sale').value,
    totalOffer: parseFloat(document.getElementById('f-offer').value) || 0.0,
    offerDate: document.getElementById('f-offer-date').value || '',
    completedDate: document.getElementById('f-completed-date').value || '',
    product: document.getElementById('f-product').value.trim()
  };

  try {
    let url = '/api/quotations';
    let method = 'POST';
    if (_editId) {
      url = `/api/quotations/${_editId}`;
      method = 'PUT';
    }
    
    // Add default values for new ones
    if (!_editId) {
      payload.progressStatus = PROGRESS_STEPS[0];
      payload.status = 'PENDING';
      payload.responsible = '';
    }

    const r = await fetch(url, {
      method,
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    
    if (r.ok) {
      closeModal();
      await refresh();
      if (_editId) selectQuote(_editId);
    } else {
      const err = await r.json();
      alert('เกิดข้อผิดพลาด: ' + (err.error || 'ไม่สามารถบันทึกได้'));
    }
  } catch(e) {
    alert('ข้อผิดพลาดการเชื่อมต่อ: ' + e.message);
  }
}

async function deleteQuotation(id) {
  if (!confirm('ต้องการลบข้อมูลใบเสนอราคานี้อย่างถาวร?')) return;
  try {
    const r = await fetch(`/api/quotations/${id}`, { method: 'DELETE' });
    if (r.ok) {
      _selected = null;
      await refresh();
    } else {
      alert('เกิดข้อผิดพลาดในการลบข้อมูล');
    }
  } catch(e) {
    alert(e.message);
  }
}

function rList() {
  const q = document.getElementById('q-search').value.toLowerCase();
  const list = _quotations.filter(x => {
    // filter
    if (_filter !== 'all' && x.status !== _filter) return false;
    
    // search
    return x.quotation_no.toLowerCase().includes(q) ||
           x.customer.toLowerCase().includes(q) ||
           (x.ld_no && x.ld_no.toLowerCase().includes(q)) ||
           (x.product && x.product.toLowerCase().includes(q));
  });
  
  const container = document.getElementById('q-list');
  if (!list.length) {
    container.innerHTML = `<div style="text-align:center;padding:24px;color:var(--mu);font-size:13px">ไม่พบข้อมูล</div>`;
    return;
  }
  
  container.innerHTML = list.map(x => `
    <div class="qcard st-${x.status} ${(_selected && _selected.id === x.id) ? 'active' : ''}" onclick="selectQuote(${x.id})">
      <div class="qc-hdr">
        <span class="qc-no">${x.quotation_no}</span>
        <span class="badge b-${x.status.toLowerCase()}">${x.status}</span>
      </div>
      <div class="qc-cust">🏭 ${x.customer}</div>
      <div class="qc-info">
        <span>👤 ${x.responsible.split('-')[0] || 'ยังไม่ได้มอบหมาย'}</span>
        <span style="font-weight:700">${x.progress_status}</span>
      </div>
    </div>
  `).join('');
}

function setFilter(f) {
  _filter = f;
  document.querySelectorAll('.fchip').forEach(c => c.classList.remove('active'));
  document.getElementById(`f-${f.toLowerCase()}`).classList.add('active');
  rList();
}

function getProgressPercent(statusText) {
  const idx = PROGRESS_STEPS.indexOf(statusText);
  if (idx < 0) return 0;
  return Math.round(((idx + 1) / PROGRESS_STEPS.length) * 100);
}

function selectQuote(id) {
  const q = _quotations.find(x => x.id === id);
  if (!q) return;
  _selected = q;
  rList(); // update active highlight
  
  const pane = document.getElementById('work-pane');
  
  const pct = getProgressPercent(q.progress_status);
  const curIdx = PROGRESS_STEPS.indexOf(q.progress_status);
  const nodes = PROGRESS_STEPS.map((step, idx) => {
    let cls = '';
    if (idx < curIdx) cls = 'done';
    else if (idx === curIdx) cls = 'active';
    return `
      <div class="t-node ${cls}" onclick="updateProgress(${q.id}, '${step}')">
        ${idx + 1}
        <div class="t-lbl">${step}</div>
      </div>
    `;
  }).join('');
  
  const widthPct = curIdx >= 0 ? Math.round((curIdx / (PROGRESS_STEPS.length - 1)) * 100) : 0;
  
  pane.innerHTML = `
    <!-- Header Summary -->
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px;">
      <div>
        <h2 style="font-size:24px; font-weight:800; font-family:'Inter',sans-serif; color:#fff">${q.quotation_no}</h2>
        <p style="color:var(--mu); font-size:13px; margin-top:4px;">LD No: ${q.ld_no || '—'} · ประเภทงาน: ${q.quotation_type} · ลูกค้า: ${q.customer}</p>
      </div>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-secondary" onclick="openEditModal(_selected)">✏️ แก้ไขข้อมูล</button>
        <button class="btn btn-danger" style="background:rgba(239,68,68,.1); color:var(--late); border:1px solid rgba(239,68,68,.2)" onclick="deleteQuotation(${q.id})">🗑️ ลบใบงาน</button>
      </div>
    </div>
    
    <!-- TIMELINE -->
    <div class="section-card">
      <div class="section-title">⏱️ ขั้นตอนการดำเนินงาน (Progress Step)</div>
      <p style="font-size:12px; color:var(--mu); margin-bottom:20px; margin-top:-8px">คลิกที่เลขขั้นตอนเพื่อเปลี่ยนสถานะความคืบหน้าของงาน</p>
      <div class="timeline">
        <div class="timeline-fill" style="width: calc(${widthPct}% - 8px)"></div>
        ${nodes}
      </div>
      <div style="height:20px"></div>
    </div>
    
    <!-- DETAIL CARD -->
    <div class="section-card">
      <div class="section-title">📄 รายละเอียดใบเสนอราคา</div>
      <div class="detail-grid">
        <div class="detail-item"><div class="detail-lbl">วันที่เปิดบอร์ด</div><div class="detail-val">${q.start_date || '—'}</div></div>
        <div class="detail-item"><div class="detail-lbl">กำหนดส่งลูกค้า</div><div class="detail-val" style="color:var(--pend)">${q.due_date || '—'}</div></div>
        <div class="detail-item"><div class="detail-lbl">ประเภทลูกค้า</div><div class="detail-val">${q.customer_type}</div></div>
        <div class="detail-item"><div class="detail-lbl">ยอดเงินที่เสนอ</div><div class="detail-val" style="color:var(--spec)">${q.total_offer ? parseFloat(q.total_offer).toLocaleString() + ' บาท' : '—'}</div></div>
        <div class="detail-item"><div class="detail-lbl">วันที่เสนอราคา</div><div class="detail-val">${q.offer_date || '—'}</div></div>
        <div class="detail-item"><div class="detail-lbl">วันที่จัดทำเสร็จ</div><div class="detail-val">${q.completed_date || '—'}</div></div>
        <div class="detail-item"><div class="detail-lbl">ทีมผู้ขาย</div><div class="detail-val">${q.sale_team} / ${q.sale}</div></div>
        <div class="detail-item" style="grid-column: span 2"><div class="detail-lbl">รายละเอียดงาน / Product</div><div class="detail-val" style="white-space:pre-wrap">${q.product || '—'}</div></div>
      </div>
    </div>
    
    <!-- WORKFLOW & CLOSE OUT -->
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
      <!-- Assignment -->
      <div class="section-card" style="margin-bottom:0">
        <div class="section-title">👤 มอบหมายงานรับผิดชอบ</div>
        <div class="fg">
          <label>วิศวกรจัดทำข้อเสนอราคา (Proposal Team)</label>
          <select id="act-resp" onchange="assignResponsible(${q.id}, this.value)" style="margin-top:8px">
            <option value="">-- ยังไม่มอบหมาย --</option>
            ${(_config.team || []).map(name => `<option value="${name}" ${q.responsible === name ? 'selected' : ''}>${name}</option>`).join('')}
          </select>
        </div>
      </div>
      
      <!-- Closeout -->
      <div class="section-card" style="margin-bottom:0">
        <div class="section-title">🟢 ปิดบอร์ดและลิงก์ประวัติ (Close Out)</div>
        <div class="fg">
          <label>สถานะของใบเสนอราคา</label>
          <select id="act-status" onchange="toggleCloseoutFields(this.value)" style="margin-top:8px">
            <option value="PENDING" ${q.status === 'PENDING' ? 'selected' : ''}>🟡 รอเสนอราคา (PENDING)</option>
            <option value="WIN" ${q.status === 'WIN' ? 'selected' : ''}>🟢 ได้รับใบสั่งซื้อ (WIN)</option>
            <option value="LOST" ${q.status === 'LOST' ? 'selected' : ''}>🔴 ไม่สำเร็จ (LOST)</option>
            <option value="HOLD" ${q.status === 'HOLD' ? 'selected' : ''}>⚪ พักงานชั่วคราว (HOLD)</option>
          </select>
        </div>
        
        <div id="closeout-win-fields" style="display:${q.status === 'WIN' ? 'block' : 'none'}; margin-top:12px">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px">
            <div class="fg" style="margin-bottom:0">
              <label>PR Number <span class="req">*</span></label>
              <input id="act-pr" placeholder="เช่น PR6905-001" value="${q.pr_no || ''}">
            </div>
            <div class="fg" style="margin-bottom:0">
              <label>PO Number</label>
              <input id="act-po" placeholder="เช่น PO6905-001" value="${q.po_no || ''}">
            </div>
          </div>
          <p style="font-size:11px; color:var(--mu); line-height:1.4">💡 เมื่อบันทึกเป็น <b>WIN</b> ระบบจะนำข้อมูลนี้ไปสร้างใบงานใน <b>PO Tracker (PR List)</b> โดยอัตโนมัติ ไม่ต้องทำซ้ำ</p>
        </div>
        
        <button class="btn btn-primary" onclick="saveCloseout(${q.id})" style="margin-top:16px; width:100%; justify-content:center">💾 บันทึกผลลัพธ์การนำเสนอ</button>
      </div>
    </div>
  `;
}

async function updateProgress(id, step) {
  try {
    const payload = { progressStatus: step };
    
    // Autocompleted date if it is final step
    if (step === PROGRESS_STEPS[PROGRESS_STEPS.length - 1]) {
      const today = new Date().toISOString().split('T')[0];
      payload.completedDate = today;
      payload.offerDate = today;
    } else {
      payload.completedDate = '';
      payload.offerDate = '';
    }

    const r = await fetch(`/api/quotations/${id}/progress`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    if (r.ok) {
      await refresh();
      selectQuote(id);
    }
  } catch(e) {
    alert(e.message);
  }
}

async function assignResponsible(id, name) {
  try {
    const r = await fetch(`/api/quotations/${id}/progress`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ responsible: name })
    });
    if (r.ok) {
      await refresh();
      selectQuote(id);
    }
  } catch(e) {
    alert(e.message);
  }
}

function toggleCloseoutFields(val) {
  document.getElementById('closeout-win-fields').style.display = val === 'WIN' ? 'block' : 'none';
}

async function saveCloseout(id) {
  const status = document.getElementById('act-status').value;
  const prNo = document.getElementById('act-pr') ? document.getElementById('act-pr').value.trim() : '';
  const poNo = document.getElementById('act-po') ? document.getElementById('act-po').value.trim() : '';

  if (status === 'WIN' && !prNo) {
    alert('กรุณาระบุเลขที่ PR เพื่อลิงก์ระบบ PO Tracker');
    return;
  }

  try {
    const r = await fetch(`/api/quotations/${id}/status`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ status, prNo, poNo })
    });
    if (r.ok) {
      alert('✓ บันทึกผลลัพธ์และอัปเดตระบบ PO Tracker สำเร็จ');
      await refresh();
      selectQuote(id);
    } else {
      const err = await r.json();
      alert('เกิดข้อผิดพลาด: ' + (err.error || 'ไม่สามารถอัปเดตสถานะได้'));
    }
  } catch(e) {
    alert(e.message);
  }
}

async function refresh() {
  await loadData();
  rList();
}

// Init
refresh();
</script>
</body>
</html>
