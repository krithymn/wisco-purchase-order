<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotation Manager 鈥� Wisco</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080d;--s1:#0c0e17;--s2:#111422;--s3:#171b2d;--s4:#1c2136;
  --bd:#222944;--bd2:#161a2e;
  --tx:#f1f3f9;--mu:#7888a7;
  --spec:#bb86fc;--blue:#3a7bd5;
  --done:#22c55e;--late:#ef4444;--pend:#eab308;--hold:#64748b;
  --done-dim:rgba(34,197,94,.1);--late-dim:rgba(239,68,68,.1);--pend-dim:rgba(234,179,8,.1);
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Sarabun','Inter',sans-serif;overflow:hidden}
#app{display:grid;grid-template-rows:60px 1fr;height:100vh}

header{background:linear-gradient(90deg,#07080d 0%,#0c0e17 50%,#07080d 100%);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:relative}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#bb86fc,#3a7bd5,#7888a7,#ef4444,transparent)}
.logo{display:flex;align-items:center;gap:12px}
.logo-name{font-size:18px;font-weight:800;font-family:'Inter',sans-serif;color:#fff}
.logo-name span{color:var(--spec)}

.btn{font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s}
.btn-primary{background:linear-gradient(135deg,var(--spec),var(--blue));color:#fff;box-shadow:0 4px 12px rgba(187,134,252,.3)}
.btn-primary:hover{opacity:.95;transform:translateY(-1px)}
.btn-secondary{background:var(--s3);color:var(--tx);border:1px solid var(--bd)}
.btn-secondary:hover{background:var(--s4)}
.btn-danger{background:var(--late);color:#fff}
.btn-danger:hover{opacity:.9}

main{display:grid;grid-template-columns:380px 1fr;overflow:hidden;height:calc(100vh - 60px)}

/* LEFT PANEL (LIST) */
.list-panel{background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.search-box{padding:16px;border-bottom:1px solid var(--bd);background:var(--s2);display:flex;flex-direction:column;gap:12px}
.search-inp{background:var(--s1);border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:10px 14px;font-size:13px;font-family:'Sarabun',sans-serif;width:100%}
.search-inp:focus{outline:none;border-color:var(--spec)}

.filter-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.fchip{font-size:11px;padding:6px 12px;border-radius:99px;border:1px solid var(--bd);background:transparent;color:var(--mu);cursor:pointer;white-space:nowrap;transition:all .15s}
.fchip.active{background:var(--s3);border-color:var(--spec);color:#fff}

.qlist{flex:1;overflow-y:auto;padding:12px}
.qcard{background:var(--s2);border:1px solid var(--bd2);border-radius:10px;padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:all .15s;position:relative}
.qcard:hover{border-color:var(--spec);transform:translateX(2px)}
.qcard.active{background:var(--s3);border-color:var(--spec);box-shadow:0 0 10px rgba(187,134,252,.1)}
.qcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
.qcard.st-WIN::before{background:var(--done)}
.qcard.st-PENDING::before{background:var(--pend)}
.qcard.st-LOST::before{background:var(--late)}
.qcard.st-HOLD::before{background:var(--hold)}

.qc-hdr{display:flex;justify-content:space-between;align-items:center}
.qc-no{font-size:14px;font-weight:800;font-family:'Inter',sans-serif}
.badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.b-win{background:var(--done-dim);color:var(--done)}
.b-pending{background:var(--pend-dim);color:var(--pend)}
.b-lost{background:var(--late-dim);color:var(--late)}
.b-hold{background:rgba(100,116,139,.15);color:var(--hold)}

.qc-cust{font-size:12px;color:var(--mu);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qc-info{display:flex;justify-content:space-between;font-size:11px;color:var(--mu);margin-top:8px}

/* RIGHT PANEL (WORK AREA) */
.work-panel{background:var(--bg);overflow-y:auto;padding:24px;display:flex;flex-direction:column}
.empty-view{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--mu)}
.empty-icon{font-size:48px;margin-bottom:16px}

.section-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.section-title{font-size:14px;font-weight:700;color:var(--spec);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;border-bottom:1px solid var(--bd);padding-bottom:8px}

.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.detail-item{background:var(--s2);border:1px solid var(--bd2);border-radius:8px;padding:12px 14px}
.detail-lbl{font-size:10px;color:var(--mu);text-transform:uppercase;margin-bottom:4px}
.detail-val{font-size:14px;font-weight:600}

/* PROGRESS BAR */
.timeline{display:flex;justify-content:space-between;margin:24px 0;position:relative;padding:0 24px}
.timeline::before{content:'';position:absolute;top:15px;left:24px;right:24px;height:2px;background:var(--s3);z-index:1}
.timeline-fill{position:absolute;top:15px;left:24px;height:2px;background:var(--done);z-index:2;transition:width .3s}
.t-node{width:32px;height:32px;border-radius:50%;background:var(--s3);border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;z-index:3;cursor:pointer;position:relative;transition:all .2s}
.t-node.done{background:var(--done);border-color:var(--done);color:#fff}
.t-node.active{background:var(--s2);border-color:var(--spec);color:var(--spec);box-shadow:0 0 10px var(--spec)}
.t-lbl{position:absolute;top:38px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;white-space:nowrap;color:var(--mu);text-align:center}
.t-node.active .t-lbl{color:var(--spec)}
.t-node.done .t-lbl{color:var(--tx)}

/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.ov.open{display:flex}
.modal{background:var(--s2);border:1px solid var(--bd);border-radius:14px;width:640px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.7)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--bd);background:var(--s1);border-radius:14px 14px 0 0}
.modal-title{font-size:16px;font-weight:700;color:#fff}
.modal-close{background:none;border:none;color:var(--mu);font-size:22px;cursor:pointer;line-height:1}
.modal-body{overflow-y:auto;padding:20px}
.modal-ftr{padding:14px 20px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:10px;background:var(--s1);border-radius:0 0 14px 14px}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.fg-span{grid-column:span 2}
.fg label{font-size:12px;font-weight:600;color:var(--mu)}
input,select,textarea{background:var(--s1);border:1px solid var(--bd);border-radius:8px;color:var(--tx);padding:8px 12px;font-size:13px;font-family:'Sarabun',sans-serif}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--spec)}
.req{color:var(--late);margin-left:2px}

/* AUTOCOMPLETE WRAP */
.autocomplete-wrap{position:relative}
.autocomplete-drop{position:absolute;top:100%;left:0;right:0;background:var(--s3);border:1px solid var(--bd);border-radius:8px;max-height:160px;overflow-y:auto;z-index:999;display:none}
.autocomplete-drop.show{display:block}
.ac-option{padding:8px 12px;font-size:12px;cursor:pointer}
.ac-option:hover{background:var(--s4);color:#fff}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px}
</style>

// Date helpers
function addBusinessDays(startDateStr, days) {
  if (!startDateStr || isNaN(days)) return '';
  let date = new Date(startDateStr);
  let count = 0;
  while (count < days) {
    date.setDate(date.getDate() + 1);
    const day = date.getDay(); // 0: Sunday, 6: Saturday
    if (day !== 0 && day !== 6) {
      count++;
    }
  }
  return date.toISOString().split('T')[0];
}

async function loadData() {

    fetch('/api/config').then(r => r.json())

  _config = cfg;

function calculateQuotationLeadTime() {
  const start = document.getElementById('f-start').value;
  const jobType = document.getElementById('f-type').value;
  const brand = document.getElementById('f-brand').value;
  const valveType = document.getElementById('f-valve-type').value;
  
  if (!start) return;
  
  let days = 0;
  const isPlatinum = brand === 'Platinum brand' || brand === 'Platinum & Golden brand';
  const isGolden = brand === 'Golden brand';
  
  if (jobType === 'MRO') {
    if (isPlatinum) {
      days = (valveType === 'Manual valve & Accessory') ? 3 : 7;
    } else if (isGolden) {
      days = (valveType === 'Manual valve & Accessory') ? 2 : 5;
    }
  } else if (jobType === 'Project') {
    if (isPlatinum) {
      days = (valveType === 'Manual valve & Accessory') ? 10 : 15;
    } else if (isGolden) {
      days = (valveType === 'Manual valve & Accessory') ? 5 : 10;
    }
  } else if (jobType === 'STOCK') {
    days = (valveType === 'Manual valve & Accessory') ? 0 : 2;
  }
  
  const dueInput = document.getElementById('f-due');
  if (dueInput) {
    dueInput.value = addBusinessDays(start, days);
  }
}

          </div>
          <div class="fg" style="margin-top:10px">
            <label>มูลค่าเสนอราคา (บาท)</label>
            <input type="number" step="0.01" min="0" id="act-offer" value="${q.total_offer || ''}" placeholder="0.00">
          </div>
          <div class="fg" style="margin-top:10px">

            <label>หมายเหตุ (Remark)</label>
            <textarea id="act-remark" rows="2" placeholder="ระบุหมายเหตุความเห็นของทีม...">${q.remark || ''}</textarea>
          </div>
          <button class="btn btn-primary" onclick="updateProposalInfo(${q.id})" style="margin-top:14px; width:100%; justify-content:center; background:linear-gradient(135deg, var(--spec), var(--blue))">💾 อัปเดตข้อมูลการจัดทำ</button>

        <div class="section-card" style="margin-bottom:0; height:100%">
          <div class="section-title">🟢 ผลการนำเสนอ (Close Out)</div>
          <div id="closeout-readonly-list" style="display:flex; flex-direction:column; gap:10px; margin-top:8px">
            <!-- populated dynamically -->
          </div>
        </div>
      </div>
    </div>
  `;
  renderReadonlyCloseout(q);
}

async function updateProposalInfo(id) {
  const offerDate = document.getElementById('act-offer-date').value;
  const completedDate = document.getElementById('act-completed-date').value;
  const totalOffer = document.getElementById('act-offer').value;
  const remark = document.getElementById('act-remark').value.trim();
  
  try {
    const r = await fetch(`/api/quotations/${id}/progress`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},

      selectQuote(id);

      alert('喔�副喔涏箑喔斷笗喔ム箟喔∴箑喔�弗喔�');
    }

    alert(err.message);

}

async function updateProgress(id, step) {
  try {
    const payload = { progressStatus: step };
    
    // Autocompleted date if it is final step
    if (step === PROGRESS_STEPS[PROGRESS_STEPS.length - 1]) {
      const today = new Date().toISOString().split('T')[0];
      payload.completedDate = today;
      payload.offerDate = today;
    } else {
      payload.completedDate = '';
      payload.offerDate = '';
    }

    const r = await fetch(`/api/quotations/${id}/progress`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    if (r.ok) {
      await refresh();
      selectQuote(id);
    }
  } catch(e) {
    alert(e.message);
  }
}

<script id="theme-script-override">
function initTheme(){
  const saved = localStorage.getItem('wisco-theme') || 'dark';
  setTheme(saved);
}
function setTheme(theme){
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    localStorage.setItem('wisco-theme', 'light');
  } else {
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('wisco-theme', 'dark');
  }
  updateToggleState(theme);
}
function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  setTheme(current);
}
function updateToggleState(theme){
  const icon = document.getElementById('theme-icon');
  const text = document.getElementById('theme-text');
  if (icon) icon.textContent = theme === 'light' ? '鈽€锔�' : '馃寵';
  if (text) text.textContent = theme === 'light' ? '喔�抚喙堗覆喔�' : '喔∴阜喔�';
}
function injectThemeButton(){
  const header = document.querySelector('header');
  if (!header) return;
  if (document.getElementById('theme-toggle')) return;
  const btn = document.createElement('button');
  btn.id = 'theme-toggle';
  btn.className = 'btn btn-sm';
  btn.onclick = toggleTheme;
  btn.style.cssText = "padding: 4px 10px; border-radius: 20px; font-size: 14px; background: var(--sur2); border: 1px solid var(--bd); cursor: pointer; display: flex; align-items: center; gap: 6px; font-family:'Sarabun',sans-serif; margin-right: 10px; flex-shrink: 0;";
  
  const saved = localStorage.getItem('wisco-theme') || 'dark';
  btn.innerHTML = `<span id="theme-icon">${saved === 'light' ? '鈽€锔�' : '馃寵'}</span> <span id="theme-text" style="font-size: 11px; font-weight: 600; color: var(--mu)">${saved === 'light' ? '喔�抚喙堗覆喔�' : '喔∴阜喔�'}</span>`;
  
  // Find where to append
  const right = header.querySelector('.header-right') || header.querySelector('div[style*="align-items:center"]') || header.querySelector('.logo + div') || header;
  if (right && right !== header) {
    right.insertBefore(btn, right.firstChild);
  } else {
    header.appendChild(btn);
  }
}
initTheme();
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', injectThemeButton);
} else {
  injectThemeButton();
}
</script>
